<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VS# IDE v4.5 — La Selva del Código</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --jg1:#0a1a0a; --jg2:#0d2b0d; --jl2:#3a8a3a; --jl3:#4caf50;
            --jac:#aaff44; --jac2:#c8ff88;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:'Comic Neue',cursive;
            background:var(--jg1);
            color:#d4ffb4;
            min-height:100vh;
        }
        body::before{
            content:'';position:fixed;inset:0;
            background:radial-gradient(ellipse 60% 40% at 20% 80%, rgba(13,43,13,0.9) 0%, transparent 70%),
                       radial-gradient(ellipse 50% 60% at 80% 20%, rgba(22,53,22,0.8) 0%, transparent 60%);
            z-index:-1;
        }
        header{
            padding:30px 40px;
            background:linear-gradient(180deg,rgba(10,26,10,0.98),rgba(10,26,10,0.7));
            border-bottom:3px solid rgba(76,175,80,0.4);
            display:flex;
            justify-content:space-between;
            align-items:center;
        }
        .logo{font-family:'Bangers',cursive;font-size:52px;letter-spacing:6px;color:var(--jac);}
        .hero{padding:80px 40px;text-align:center;}
        .hero h1{font-family:'Bangers',cursive;font-size:4.5rem;color:var(--jac2);}
        .download-btn{
            display:inline-block;
            margin:30px 0;
            padding:18px 50px;
            font-family:'Bangers',cursive;
            font-size:24px;
            background:linear-gradient(135deg,var(--jl2),var(--jl3));
            color:#0a1a0a;
            border:5px solid var(--jac);
            border-radius:16px;
            text-decoration:none;
            box-shadow:0 8px 0 #1a3a00;
        }
        .download-btn:hover{transform:translateY(-6px);}
    </style>
</head>
<body>
    <header>
        <div class="logo">VS<span>#</span> 🌿</div>
    </header>

    <section class="hero">
        <h1>VS# IDE v4.5</h1>
        <p>El entorno de desarrollo más salvaje de la jungla</p>
        
        <a href="https://drive.google.com/file/d/11E61LpbmOVlUj2st78lLCXJXDNnjCHJj/view?usp=sharing" class="download-btn" target="_blank">
            ⬇ DESCARGAR VS# IDE v4.5.0
        </a>
        
        <p style="margin-top:40px;color:#7ec87e;">Programa en español • Void Engine 3D • Exporta a HTML</p>
    </section>
</body>
</html>
